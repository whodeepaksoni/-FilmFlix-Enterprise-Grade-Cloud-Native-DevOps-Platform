name: FilmFlix CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend Docker image
        run: |
          docker build \
             -t ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-api:latest \
             -t ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-api:${{ github.sha }} .

      - name: Build client Docker image
        run: |
          docker build \
             -t ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-client:latest \
             -t ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-client:${{ github.sha }} ./client


      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-api:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan client image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-client:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: push backend image 
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-api:${{ github.sha }}

      - name: push client image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-client:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/filmflix-client:${{ github.sha }}