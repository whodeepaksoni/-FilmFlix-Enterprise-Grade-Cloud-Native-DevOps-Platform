services:
  mongodb:
    image: mongo:6
    container_name: mongodb_filmflix
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
    
  backend:
    build: .
    container_name: backend_filmflix
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongodb:27017/filmflix
      - JWT_SECRET=filmflixsecret