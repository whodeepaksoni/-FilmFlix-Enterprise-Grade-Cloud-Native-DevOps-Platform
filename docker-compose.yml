services:
  mongodb:
    image: mongo:6
    container_name: mongodb_filmflix
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
    
  backend:
    build: .
    container_name: backend_filmflix
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongodb:27017/filmflix
      - JWT_SECRET=filmflixsecret

  client:
    build: ./client
    container_name: client_filmflix
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_filmflix
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - backend