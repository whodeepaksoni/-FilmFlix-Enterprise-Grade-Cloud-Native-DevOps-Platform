services:
  mongodb:
    image: mongo:6
    container_name: mongodb_filmflix
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: whodeepaksoni/filmflix-backend:latest
    container_name: backend_filmflix
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/filmflix
      SECRET_KEY: ${JWT_SECRET}

  admin: 
    image: whodeepaksoni/filmflix-admin:latest
    container_name: admin_filmflix
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend


volumes:
  mongodb_data: