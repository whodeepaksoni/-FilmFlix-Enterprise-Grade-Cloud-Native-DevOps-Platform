name: FilmFlix CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/filmflix-backend:latest .

      - name: Build Admin Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/filmflix-admin:latest ./admin

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/filmflix-backend:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/filmflix-backend:latest

      - name: Push Admin Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/filmflix-admin:latest