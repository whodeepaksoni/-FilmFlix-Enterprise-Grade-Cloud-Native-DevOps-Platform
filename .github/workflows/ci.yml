name: FilmFlix CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend Docker image
        run: docker build -t filmflix-api:test .

      - name: Build client Docker image
        run: docker build -t filmflix-client:test ./client


      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: filmflix-api:test
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan client image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: filmflix-client:test
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
