services:
  mongodb:
    image: mongo:6
    container_name: mongodb_filmflix
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  backend:
    image: whodeepaksoni/filmflix-api:latest
    container_name: backend_filmflix
    restart: unless-stopped
    expose:
      - "5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/filmflix
      SECRET_KEY: ${JWT_SECRET}

  client:
    image: whodeepaksoni/filmflix-client:latest
    container_name: client_filmflix
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_filmflix
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - backend

volumes:
  mongodb_data: